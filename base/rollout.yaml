apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: demo-app
  labels:
    app: demo-app
spec:
  replicas: 3
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app: demo-app
  template:
    metadata:
      labels:
        app: demo-app
        version: stable
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: demo-app
        image: docker.io/siravichibm123/demo-app:v1.1.0
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 3000
          protocol: TCP
        env:
        - name: PORT
          value: "3000"
        - name: VERSION
          value: "v1.0.0"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /health/live
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health/ready
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        startupProbe:
          httpGet:
            path: /health/startup
            port: http
          initialDelaySeconds: 0
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 30
      terminationGracePeriodSeconds: 30
  
  # Canary deployment strategy
  strategy:
    canary:
      # Reference to stable and canary services
      stableService: dev-demo-app-stable
      canaryService: dev-demo-app-canary
      
      # Traffic routing via Istio
      trafficRouting:
        istio:
          virtualService:
            name: demo-app
            routes:
            - primary
          destinationRule:
            name: demo-app
            canarySubsetName: canary
            stableSubsetName: stable
      
      # Canary steps with automated analysis
      steps:
      # Step 1: Deploy canary with 10% traffic
      - setWeight: 10
      - pause:
          duration: 2m
      
      # Step 2: Run analysis for 5 minutes
      - analysis:
          templates:
          - templateName: demo-app-success-rate
          - templateName: demo-app-error-rate
          - templateName: demo-app-latency
          args:
          - name: service-name
            value: demo-app-canary
          - name: prometheus-url
            value: http://prometheus-operated.monitoring.svc.cluster.local:9090
      
      # Step 3: If analysis passes, increase to 25%
      - setWeight: 25
      - pause:
          duration: 2m
      
      # Step 4: Run analysis again
      - analysis:
          templates:
          - templateName: demo-app-success-rate
          - templateName: demo-app-error-rate
          - templateName: demo-app-latency
          args:
          - name: service-name
            value: demo-app-canary
          - name: prometheus-url
            value: http://prometheus-operated.monitoring.svc.cluster.local:9090
      
      # Step 5: Increase to 50%
      - setWeight: 50
      - pause:
          duration: 3m
      
      # Step 6: Run analysis
      - analysis:
          templates:
          - templateName: demo-app-success-rate
          - templateName: demo-app-error-rate
          - templateName: demo-app-latency
          args:
          - name: service-name
            value: demo-app-canary
          - name: prometheus-url
            value: http://prometheus-operated.monitoring.svc.cluster.local:9090
      
      # Step 7: Increase to 75%
      - setWeight: 75
      - pause:
          duration: 2m
      
      # Step 8: Final analysis before full rollout
      - analysis:
          templates:
          - templateName: demo-app-success-rate
          - templateName: demo-app-error-rate
          - templateName: demo-app-latency
          args:
          - name: service-name
            value: demo-app-canary
          - name: prometheus-url
            value: http://prometheus-operated.monitoring.svc.cluster.local:9090
      
      # Step 9: Full rollout
      - setWeight: 100
      - pause:
          duration: 1m
      
      # Analysis configuration
      analysis:
        # Run analysis in background during canary
        startingStep: 2
        
      # Anti-affinity to spread canary pods
      # antiAffinity:
      #   preferredDuringSchedulingIgnoredDuringExecution: {}
      
      # Max surge and unavailable
      maxSurge: "25%"
      maxUnavailable: 0
      
      # Abort conditions - automatic rollback triggers
      abortScaleDownDelaySeconds: 30

      canaryMetadata:
        labels:
          version: canary

