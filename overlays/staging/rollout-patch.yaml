apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: demo-app
spec:
  replicas: 3
  strategy:
    canary:
      steps:
      # Moderate canary for staging environment
      - setWeight: 10
      - pause:
          duration: 2m
      - setWeight: 25
      - pause:
          duration: 2m
      - setWeight: 50
      - pause:
          duration: 3m
      - setWeight: 100

