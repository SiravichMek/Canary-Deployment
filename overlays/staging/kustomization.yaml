apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: canary-demo-staging

namePrefix: staging-

resources:
- ../../base

labels:
- pairs:
    environment: staging
    tier: pre-production

patches:
- path: rollout-patch.yaml

images:
- name: docker.io/siravichibm123/demo-app
  newTag: v1.0.0-rc

configMapGenerator:
- name: demo-app-config
  literals:
  - ENVIRONMENT=staging
  - LOG_LEVEL=info
  - ENABLE_DEBUG=false

