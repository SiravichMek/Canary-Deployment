apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: canary-demo-staging

namePrefix: staging-

resources:
- ../../base

commonLabels:
  environment: staging
  tier: pre-production

patches:
- path: rollout-patch.yaml

images:
- name: demo-app
  newTag: v1.0.0-rc

replicas:
- name: demo-app
  count: 3

configMapGenerator:
- name: demo-app-config
  literals:
  - ENVIRONMENT=staging
  - LOG_LEVEL=info
  - ENABLE_DEBUG=false

