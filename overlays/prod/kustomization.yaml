apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: canary-demo

resources:
- ../../base

commonLabels:
  environment: production
  tier: production

patches:
- path: rollout-patch.yaml
- path: resources-patch.yaml

images:
- name: demo-app
  newTag: v1.0.0

replicas:
- name: demo-app
  count: 5

configMapGenerator:
- name: demo-app-config
  literals:
  - ENVIRONMENT=production
  - LOG_LEVEL=warn
  - ENABLE_DEBUG=false
  - ENABLE_METRICS=true

