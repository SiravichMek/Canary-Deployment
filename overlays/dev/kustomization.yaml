apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: canary-demo-dev

namePrefix: dev-

resources:
- ../../base

labels:
- pairs:
    environment: dev
    tier: development

patches:
- path: rollout-patch.yaml
# - path: analysis-patch.yaml

images:
- name: docker.io/siravichibm123/demo-app
  newTag: v1.6.0-dev

configMapGenerator:
- name: demo-app-config
  literals:
  - ENVIRONMENT=development
  - LOG_LEVEL=debug
  - ENABLE_DEBUG=true

# Made with Bob
