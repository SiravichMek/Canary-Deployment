apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: canary-demo-dev

namePrefix: dev-

resources:
- ../../base

commonLabels:
  environment: dev
  tier: development

patches:
- path: rollout-patch.yaml
- path: analysis-patch.yaml

images:
- name: demo-app
  newTag: v1.1.0-dev

replicas:
- name: demo-app
  count: 2

configMapGenerator:
- name: demo-app-config
  literals:
  - ENVIRONMENT=development
  - LOG_LEVEL=debug
  - ENABLE_DEBUG=true

