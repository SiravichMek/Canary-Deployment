---
# ArgoCD Application for Production Environment
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: demo-app-prod
  namespace: argocd
  labels:
    app: demo-app
    environment: production
  annotations:
    notifications.argoproj.io/subscribe.on-sync-succeeded.slack: canary-demo-alerts
    notifications.argoproj.io/subscribe.on-sync-failed.slack: canary-demo-alerts
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: canary-demo
  
  source:
    repoURL: https://github.com/SiravichMek/Canary-Deployment.git
    targetRevision: main
    path: overlays/prod
  
  destination:
    server: https://kubernetes.default.svc
    namespace: canary-demo
  
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
    - CreateNamespace=true
    - PrunePropagationPolicy=foreground
    - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  
  # Ignore differences in Rollout status and replica counts
  ignoreDifferences:
  - group: argoproj.io
    kind: Rollout
    jsonPointers:
    - /spec/replicas
    - /status
  - group: networking.istio.io
    kind: VirtualService
    jsonPointers:
    - /spec/http/0/route/0/weight
    - /spec/http/0/route/1/weight

# Made with Bob
